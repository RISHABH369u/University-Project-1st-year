<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTSNS University Shahdol — 3D Campus Tour</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a1628; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
canvas { display: block; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }

#ui { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 10; }

#title {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(8, 20, 55, 0.82); backdrop-filter: blur(10px);
  color: #fff; padding: 9px 22px; border-radius: 22px;
  font-size: 13px; font-weight: 600; white-space: nowrap;
  border: 1px solid rgba(100, 160, 255, 0.28); letter-spacing: 0.4px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
}
#title span { color: #88b8ff; font-weight: 400; }

#hint {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.55); color: rgba(255,255,255,0.78);
  padding: 6px 18px; border-radius: 18px; font-size: 11px; white-space: nowrap;
  border: 1px solid rgba(255,255,255,0.12);
}

#panel {
  display: none; position: absolute; top: 16px; right: 16px;
  background: rgba(255,255,255,0.97); border-radius: 14px;
  padding: 18px 20px; width: 230px; pointer-events: all;
  box-shadow: 0 8px 36px rgba(0,0,0,0.25);
  border: 1px solid rgba(0,0,0,0.08);
}
#panel-icon { font-size: 24px; margin-bottom: 8px; }
#panel-name { font-size: 15px; font-weight: 700; color: #1a2a4a; margin-bottom: 6px; }
#panel-desc { font-size: 12px; color: #555; line-height: 1.65; }
#panel-close {
  margin-top: 12px; font-size: 11px; padding: 5px 14px; cursor: pointer;
  border-radius: 8px; border: 1px solid #ddd; background: #f5f5f5;
  color: #666; transition: background 0.15s;
}
#panel-close:hover { background: #ececec; }

#legend {
  position: absolute; bottom: 16px; right: 16px;
  background: rgba(0,0,0,0.55); color: rgba(255,255,255,0.75);
  padding: 7px 12px; border-radius: 10px; font-size: 10px; line-height: 1.9;

}
#legend div::before { content: '●'; margin-right: 5px; }
#legend .lb { color: #88ccff; }
#legend .lg { color: #88ff88; }
#legend .ly { color: #ffcc44; }
#legend .lr { color: #ffaaaa; }

#compass {
  position: absolute; top: 70px; right: 16px;
  width: 46px; height: 46px; border-radius: 50%;
  background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: white; font-size: 9px; font-weight: 700;
}
#compass .cn { color: #ff5555; font-size: 16px; line-height: 1; }

#loading {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: #0a1628; display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 100;
  color: white;
}
#loading h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
#loading p { font-size: 13px; color: #88aacc; }
</style>
</head>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;

// ═══════════════════════════════════════════════
//  SCENE
// ═══════════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7ec8e3);
scene.fog = new THREE.Fog(0x9dd8ed, 150, 320);

// ═══════════════════════════════════════════════
//  CAMERA & ORBIT
// ═══════════════════════════════════════════════
const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 600);
const orbit = { theta: -0.45, phi: 0.68, r: 120, tx: 0, ty: 0, tz: 32 };

function updateCam() {
  camera.position.set(
    orbit.tx + orbit.r * Math.sin(orbit.phi) * Math.sin(orbit.theta),
    orbit.ty + orbit.r * Math.cos(orbit.phi),
    orbit.tz + orbit.r * Math.sin(orbit.phi) * Math.cos(orbit.theta)
  );
  camera.lookAt(orbit.tx, 0, orbit.tz);
}
updateCam();

// ═══════════════════════════════════════════════
//  LIGHTING
// ═══════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xffeedd, 0.62));
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x3a6820, 0.45));

const sun = new THREE.DirectionalLight(0xfff8e8, 1.18);
sun.position.set(80, 110, 70);
sun.castShadow = true;
sun.shadow.mapSize.width = 4096;
sun.shadow.mapSize.height = 4096;
sun.shadow.camera.left = -140;
sun.shadow.camera.right = 140;
sun.shadow.camera.top = 140;
sun.shadow.camera.bottom = -140;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 500;
sun.shadow.bias = -0.001;
scene.add(sun);

// ═══════════════════════════════════════════════
//  GEOMETRY HELPERS
// ═══════════════════════════════════════════════
const mats = {};
function getMat(color) {
  if (!mats[color]) mats[color] = new THREE.MeshLambertMaterial({ color });
  return mats[color];
}

function mkBox(x, y, z, w, h, d, color, castSh = true, recvSh = true) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), getMat(color));
  m.position.set(x, y + h / 2, z);
  if (castSh) m.castShadow = true;
  if (recvSh) m.receiveShadow = true;
  scene.add(m);
  return m;
}

function mkPlane(x, z, w, d, color, y = 0) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), getMat(color));
  m.rotation.x = -Math.PI / 2;
  m.position.set(x, y, z);
  m.receiveShadow = true;
  scene.add(m);
  return m;
}

// ═══════════════════════════════════════════════
//  Old wall function (simple solid wall without jali or pillars)
// ═══════════════════════════════════════════════

// function mkWall(x1, z1, x2, z2, h = 2.6, color = 0xd2cfc0) {
//   const dx = x2 - x1, dz = z2 - z1;
//   const len = Math.sqrt(dx * dx + dz * dz);
//   const m = new THREE.Mesh(new THREE.BoxGeometry(len, h, 0.55), getMat(color));
//   m.position.set((x1 + x2) / 2, h / 2, (z1 + z2) / 2);
//   m.rotation.y = Math.atan2(dz, dx);
//   m.castShadow = true;
//   scene.add(m);
// }


// ═══════════════════════════════════════════════
//  Wall new elaborate function with jali and pillars
// ═══════════════════════════════════════════════


function mkWall(x1, z1, x2, z2, h = 2.6, color = 0xd2cfc0) {
  const dx = x2 - x1, dz = z2 - z1;
  const len = Math.sqrt(dx * dx + dz * dz);
  const angle = Math.atan2(dz, dx);

  const group = new THREE.Group();

  // === BASE WALL (solid bottom) ===
  const baseHeight = h * 0.65;
  const base = new THREE.Mesh(
    new THREE.BoxGeometry(len, baseHeight, 0.6),
    getMat(color)
  );
  base.position.y = baseHeight / 2;
  base.castShadow = true;
  group.add(base);

  // === TOP JALI (grill style) ===
  const grillHeight = h - baseHeight;

  const segmentWidth = 2; // spacing of jali
  const segments = Math.floor(len / segmentWidth);

  for (let i = 0; i < segments; i++) {
    const gx = -len / 2 + segmentWidth * i + segmentWidth / 2;

    // vertical bars
    const bar = new THREE.Mesh(
      new THREE.BoxGeometry(0.08, grillHeight, 0.08),
      getMat(0x444444)
    );
    bar.position.set(gx, baseHeight + grillHeight / 2, 0);
    group.add(bar);
  }

  // top horizontal beam
  const topBeam = new THREE.Mesh(
    new THREE.BoxGeometry(len, 0.15, 0.2),
    getMat(0x999999)
  );
  topBeam.position.y = h + 0.05;
  group.add(topBeam);

  // === PILLARS (every few meters) ===
  const pillarGap = 4;
  const pillarCount = Math.floor(len / pillarGap);

  for (let i = 0; i <= pillarCount; i++) {
    const px = -len / 2 + i * pillarGap;

    const pillar = new THREE.Mesh(
      new THREE.BoxGeometry(0.8, h + 0.4, 0.8),
      getMat(0xc8c4b0)
    );
    pillar.position.set(px, (h + 0.4) / 2, 0);
    pillar.castShadow = true;
    group.add(pillar);
  }

  // === POSITION & ROTATION ===
  group.position.set((x1 + x2) / 2, 0, (z1 + z2) / 2);
  group.rotation.y = angle;

  scene.add(group);
}


// ═══════════════════════════════════════════════
//  GROUND
// ═══════════════════════════════════════════════
mkPlane(0, 35, 420, 420, 0x537a30);

// ═══════════════════════════════════════════════
//  ROADS
// ═══════════════════════════════════════════════
const ROAD = 0xb5a898;
const ROAD_SIDE = 0xc8b870; // yellow curb

// Main north road (from gate inward)
mkPlane(0, 5, 10, 38, ROAD, 0.02);   // Gate to IT Cell
mkPlane(0, 35, 10, 30, ROAD, 0.02);  // IT Cell to Agriculture zone
mkPlane(0, 63, 10, 34, ROAD, 0.02);  // Library zone

// Left branch to Main Building
mkPlane(-14, 20, 4.5, 24, ROAD, 0.02);
mkPlane(-25, 10, 4.5, 4,  ROAD, 0.02);

// Right branch to Agriculture & beyond
mkPlane(15, 40, 5, 20, ROAD, 0.02);
mkPlane(-8, 52, 5, 14, ROAD, 0.02); // to multipurpose

// Yellow road kerbs (painted lines)
for (let z = -12; z <= 78; z += 5) {
  mkPlane(-5.2, z, 0.4, 4.5, ROAD_SIDE, 0.025);
  mkPlane(5.2, z, 0.4, 4.5, ROAD_SIDE, 0.025);
}

// ═══════════════════════════════════════════════
//  PARKING AREAS
// ═══════════════════════════════════════════════
function mkParking(x, z, w, d) {
  mkPlane(x, z, w, d, 0x7a7a6a, 0.03);
  const nLines = Math.floor(d / 3.8);
  for (let i = 0; i <= nLines; i++) {
    const lz = z - d / 2 + i * 3.8;
    mkPlane(x, lz, w - 1, 0.14, 0xffffff, 0.04);
  }
}
mkParking(20, 9, 18, 18);   // Visitor / student parking (right of gate road)
mkParking(-16, 24, 14, 12); // Teachers / faculty parking (left of IT Cell)

// ═══════════════════════════════════════════════
//  LAWNS & OPEN AREAS
// ═══════════════════════════════════════════════
mkPlane(0, 3, 9, 8, 0x4CAF50, 0.01);      // Entrance median / green strip
mkPlane(-10, 18, 10, 14, 0x4CAF50, 0.01); // Lawn in front of main building
mkPlane(-26, 5, 16, 8, 0x4CAF50, 0.01);   // Side lawn main building
mkPlane(10, 50, 16, 14, 0x4CAF50, 0.01);  // Central FREE SPACE / open ground
mkPlane(-20, 62, 10, 12, 0x4CAF50, 0.01); // Left side lawn
mkPlane(4, 76, 28, 8, 0x4CAF50, 0.01);    // Back lawn

// Sports ground
mkPlane(40, 62, 22, 24, 0x45a049, 0.01);
mkPlane(40, 62, 3, 14, 0xc2b260, 0.02);   // Cricket pitch

// ═══════════════════════════════════════════════
//  BOUNDARY WALL (campus perimeter)
// ═══════════════════════════════════════════════
// South wall with gate gap
mkWall(-62, -14, -14, -14);
mkWall(14, -14, 62, -14);
// Other sides
mkWall(-62, -14, -62, 88);
mkWall(62, -14, 62, 88);
mkWall(-62, 88, 62, 88);

// Internal compound walls
mkWall(-42, 0, -42, 45, 2, 0xc8c4b0);
mkWall(36, 0, 36, 55, 2, 0xc8c4b0);

// ═══════════════════════════════════════════════
//  BUILDING SYSTEM
// ═══════════════════════════════════════════════
const clickable = [];
const winMat = new THREE.MeshLambertMaterial({ color: 0x90c0d8, emissive: 0x1a3a5a, emissiveIntensity: 0.12 });
const doorMat = new THREE.MeshLambertMaterial({ color: 0x4a3218 });

function floorHeight(floors) {
  return floors === 1 ? 4 : floors === 2 ? 7.5 : floors === 3 ? 11 : floors === 4 ? 14.5 : 18;
}

function addBuilding({ x, z, w, d, floors, color, name, desc, icon = '🏢', roofColor = 0x888888 }) {
  const h = floorHeight(floors);
  const perFloor = h / floors;
  const group = new THREE.Group();

  // Main body
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color })
  );
  body.position.y = h / 2;
  body.castShadow = true;
  body.receiveShadow = true;
  body.userData = { name, desc, icon };
  group.add(body);
  clickable.push(body);

  // Roof slab + parapet
  const roofSlab = new THREE.Mesh(new THREE.BoxGeometry(w + 0.6, 0.6, d + 0.6), getMat(roofColor));
  roofSlab.position.y = h + 0.3;
  roofSlab.castShadow = true;
  group.add(roofSlab);

  // Parapet wall on roof edges
  const parW = new THREE.Mesh(new THREE.BoxGeometry(w + 0.6, 0.8, 0.3), getMat(0x999999));
  parW.position.y = h + 1;
  parW.position.z = d / 2 + 0.45;
  group.add(parW);
  const parW2 = parW.clone(); parW2.position.z = -d / 2 - 0.45; group.add(parW2);
  const parD = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, d + 0.6), getMat(0x999999));
  parD.position.y = h + 1; parD.position.x = w / 2 + 0.45; group.add(parD);
  const parD2 = parD.clone(); parD2.position.x = -w / 2 - 0.45; group.add(parD2);

  // Floor separator lines
  for (let f = 1; f < floors; f++) {
    const sep = new THREE.Mesh(
      new THREE.BoxGeometry(w + 0.15, 0.25, d + 0.15),
      getMat(0xaaaaaa)
    );
    sep.position.y = perFloor * f;
    group.add(sep);
  }

  // Corner columns
  const colMat = getMat(0xbbbbbb);
  for (let cx of [-w / 2, w / 2]) {
    for (let cz of [-d / 2, d / 2]) {
      const col = new THREE.Mesh(new THREE.BoxGeometry(0.6, h + 0.6, 0.6), colMat);
      col.position.set(cx, h / 2, cz);
      group.add(col);
    }
  }

  // Windows: front & back
  const nWX = Math.max(2, Math.floor(w / 2.0));
  const nWZ = Math.max(1, Math.floor(d / 2.4));

  for (let fl = 0; fl < floors; fl++) {
    const wy = perFloor * fl + perFloor * 0.52;

    for (let col = 0; col < nWX; col++) {
      const wx = -w / 2 + (w / nWX) * (col + 0.5);
      // Front
      const wf = new THREE.Mesh(new THREE.PlaneGeometry(0.85, 0.78), winMat);
      wf.position.set(wx, wy, d / 2 + 0.01);
      group.add(wf);
      // Back
      const wb = wf.clone();
      wb.rotation.y = Math.PI; wb.position.z = -d / 2 - 0.01;
      group.add(wb);
    }
    // Side windows
    for (let col = 0; col < nWZ; col++) {
      const wz = -d / 2 + (d / nWZ) * (col + 0.5);
      const wl = new THREE.Mesh(new THREE.PlaneGeometry(0.85, 0.78), winMat);
      wl.rotation.y = -Math.PI / 2; wl.position.set(-w / 2 - 0.01, wy, wz);
      group.add(wl);
      const wr = wl.clone(); wr.rotation.y = Math.PI / 2; wr.position.x = w / 2 + 0.01;
      group.add(wr);
    }
  }

  // Ground floor door
  const door = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 2.5), doorMat);
  door.position.set(0, 1.25, d / 2 + 0.02);
  group.add(door);

  // Door frame
  const dfMat = getMat(0x6a5030);
  const dfL = new THREE.Mesh(new THREE.BoxGeometry(0.15, 2.6, 0.08), dfMat);
  dfL.position.set(-0.75, 1.3, d / 2 + 0.02); group.add(dfL);
  const dfR = dfL.clone(); dfR.position.x = 0.75; group.add(dfR);
  const dfT = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.15, 0.08), dfMat);
  dfT.position.set(0, 2.6, d / 2 + 0.02); group.add(dfT);

  group.position.set(x, 0, z);
  scene.add(group);
  return group;
}

// ═══════════════════════════════════════════════
//  ALL CAMPUS BUILDINGS
// ═══════════════════════════════════════════════

// 1. IT Cell — 2 floors, right-center after gate
addBuilding({

// 2. Main Academic Building — 3 floors, large, LEFT side
addBuilding({

addBuilding({

addBuilding({

addBuilding({

addBuilding({

addBuilding({

  name: 'Student Hostel', icon: '🏠',

// 8. VC Residence — 2 floors, far LEFT back area
addBuilding({

});

// 9. Administrative Block — 2 floors, left back (beyond main building)
addBuilding({
  x: -28, z: 38, w: 18, d: 10, floors: 2, color: 0xd2dcea,
  name: 'Administrative Block', icon: '🏛️',
  desc: 'Houses Registrar office, Accounts & Finance department, Examination Cell, Scholarship Wing, Student Affairs office, and other key administrative services of the university.'
});

// 10. Science Block — 2 floors, right mid
addBuilding({
  x: 22, z: 56, w: 13, d: 9, floors: 2, color: 0xd0e8da,
  name: 'Science Block', icon: '🔬',
  desc: 'Dedicated to Physics, Chemistry, Botany, and Zoology departments. Equipped with modern laboratories, fume hoods, research benches, and departmental faculty cabins.'
});

// 11. Faculty / Staff Block — 2 floors, far left near main building
addBuilding({
  x: -42, z: 22, w: 9, d: 9, floors: 2, color: 0xe4d8c8,
  name: 'Faculty Block', icon: '👨‍🏫',
  desc: 'Houses faculty offices, staff rooms, and departmental head cabins. Staff can meet students, conduct tutorials, and hold departmental meetings here.'
});

// 12. Additional building (Exam / NCC Block)
addBuilding({
  x: -42, z: 40, w: 9, d: 8, floors: 1, color: 0xdde0d0,
  name: 'NCC / NSS Block', icon: '🎖️',
  desc: 'Dedicated facility for NCC and NSS units of the university. Used for drill practice, training sessions, community service coordination, and cadet activities.'
});

// ═══════════════════════════════════════════════
//  MAIN GATE
// ═══════════════════════════════════════════════
{
  const wMat = getMat(0xf0f0f0);   // white pillars
  const bMat = getMat(0x1a4edd);   // blue banner

function mkTree(x, z, s = 1, leaf = 0x2E7D32) {
  const g = new THREE.Group();
  // Trunk
  const t = new THREE.Mesh(
    new THREE.CylinderGeometry(0.22 * s, 0.3 * s, 2.8 * s, 6),
    getMat(0x6B3A18)
  );
  t.position.y = 1.4 * s; t.castShadow = true; g.add(t);
  // Foliage: two spheres for fuller look
  const f1 = new THREE.Mesh(new THREE.SphereGeometry(1.7 * s, 7, 5), getMat(leaf));
  f1.position.y = 4.5 * s; f1.castShadow = true; g.add(f1);
  const f2 = new THREE.Mesh(new THREE.SphereGeometry(1.2 * s, 6, 4), getMat(leaf === 0x2E7D32 ? 0x388E3C : leaf));
  f2.position.set(0.7 * s, 5.5 * s, 0.4 * s); f2.castShadow = true; g.add(f2);
  g.position.set(x, 0, z); scene.add(g);
}

function mkPalm(x, z, s = 1) {
  const g = new THREE.Group();
  const t = new THREE.Mesh(new THREE.CylinderGeometry(0.15*s, 0.22*s, 7*s, 6), getMat(0x9b7530));
  t.position.y = 3.5 * s; t.castShadow = true; g.add(t);
  for (let i = 0; i < 6; i++) {
    const fr = new THREE.Mesh(new THREE.ConeGeometry(0.12*s, 4*s, 5), getMat(0x3a8820));
    fr.position.y = 6.5 * s;
    fr.rotation.z = 0.65; fr.rotation.y = (Math.PI * 2 / 6) * i;
    g.add(fr);
  }
  g.position.set(x, 0, z); scene.add(g);
}

// ═══════════════════════════════════════════════
//  RAYCASTER & INTERACTION
// ═══════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouseVec = new THREE.Vector2();
let isDragging = false, prevX = 0, prevY = 0, dragDist = 0;

window.addEventListener('mousedown', e => {
  isDragging = true; prevX = e.clientX; prevY = e.clientY; dragDist = 0;
});
window.addEventListener('mouseup', e => {
  isDragging = false;
  if (dragDist < 5) {
    mouseVec.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouseVec.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouseVec, camera);
    const hits = raycaster.intersectObjects(clickable, false);
    if (hits.length && hits[0].object.userData.name) {
      const { name, desc, icon } = hits[0].object.userData;
      document.getElementById('panel-icon').textContent = icon;
      document.getElementById('panel-name').textContent = name;
      document.getElementById('panel-desc').textContent = desc;
      document.getElementById('panel').style.display = 'block';
    }
  }
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevX, dy = e.clientY - prevY;
  dragDist += Math.abs(dx) + Math.abs(dy);
  orbit.theta -= dx * 0.0036;
  orbit.phi = Math.max(0.08, Math.min(1.5, orbit.phi + dy * 0.0036));
  prevX = e.clientX; prevY = e.clientY;
  updateCam();
});
window.addEventListener('wheel', e => {
  orbit.r = Math.max(15, Math.min(240, orbit.r + e.deltaY * 0.075));
  updateCam();
  e.preventDefault();
}, { passive: false });

// Touch support
let lastT = null, pinchDist0 = 0;
window.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { lastT = e.touches[0]; dragDist = 0; }
  if (e.touches.length === 2) {
    pinchDist0 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });
window.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && lastT) {
    const t = e.touches[0];
    const dx = t.clientX - lastT.clientX, dy = t.clientY - lastT.clientY;
    dragDist += Math.abs(dx) + Math.abs(dy);
    orbit.theta -= dx * 0.004;
    orbit.phi = Math.max(0.08, Math.min(1.5, orbit.phi + dy * 0.004));
    lastT = t; updateCam();
  } else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    orbit.r = Math.max(15, Math.min(240, orbit.r - (d - pinchDist0) * 0.28));
    pinchDist0 = d; updateCam();
  }
}, { passive: false });
window.addEventListener('touchend', () => { lastT = null; });

// Keyboard: WASD pan
const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
function handleKeys() {
  const speed = 0.5;
  const dir = new THREE.Vector3();
  if (keys['a']) dir.x -= 1;
  if (keys['d']) dir.x += 1;
  if (keys['w']) dir.z -= 1;
  if (keys['s']) dir.z += 1;
  if (dir.length() > 0) {
    dir.normalize().multiplyScalar(speed);
    dir.applyEuler(new THREE.Euler(0, orbit.theta, 0));
    orbit.tx += dir.x; orbit.tz += dir.z;
    updateCam();
  }
  if (keys['q']) { orbit.r = Math.max(15, orbit.r - speed * 1.5); updateCam(); }
  if (keys['e']) { orbit.r = Math.min(240, orbit.r + speed * 1.5); updateCam(); }
}

// Resize
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// ═══════════════════════════════════════════════
//  ANIMATE
// ═══════════════════════════════════════════════
let frameCount = 0;
function animate() {
  requestAnimationFrame(animate);
  handleKeys();
  // Subtle flag waving (future: add morph targets)
  renderer.render(scene, camera);
  frameCount++;
  if (frameCount === 2) {
    document.getElementById('loading').style.display = 'none';
  }
}
animate();
