
<div style="position: relative; width: 100%; height: 520px; overflow: hidden; border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary);">
  <canvas id="c" style="width: 100%; height: 100%; display: block;"></canvas>
  <div id="hud" style="position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 12px; color: rgba(255,255,255,0.85); background: rgba(0,0,0,0.35); padding: 5px 12px; border-radius: 20px; pointer-events: none; white-space: nowrap;">
    Drag to orbit &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Click buildings for info
  </div>
  <div id="panel" style="display: none; position: absolute; top: 12px; right: 12px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 16px; width: 190px; box-sizing: border-box;">
    <div id="ptitle" style="font-weight: 500; font-size: 14px; margin-bottom: 4px; color: var(--color-text-primary);"></div>
    <div id="pdesc" style="font-size: 12px; color: var(--color-text-secondary); line-height: 1.5;"></div>
    <button onclick="document.getElementById('panel').style.display='none'" style="margin-top: 10px; font-size: 11px; padding: 3px 10px; cursor: pointer; border-radius: 6px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary);">Close</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('c');
const cont = canvas.parentElement;
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setSize(cont.offsetWidth, cont.offsetHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 50, 130);

const camera = new THREE.PerspectiveCamera(55, cont.offsetWidth / cont.offsetHeight, 0.1, 200);

const sph = { theta: 0.78, phi: 1.0, r: 52 };
function applyCamera() {
  camera.position.set(
    sph.r * Math.sin(sph.phi) * Math.sin(sph.theta),
    sph.r * Math.cos(sph.phi),
    sph.r * Math.sin(sph.phi) * Math.cos(sph.theta)
  );
  camera.lookAt(0, 0, 0);
}
applyCamera();

const amb = new THREE.AmbientLight(0xfff8ee, 0.55);
scene.add(amb);
const sun = new THREE.DirectionalLight(0xfff3cc, 1.1);
sun.position.set(35, 55, 25);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -65;
sun.shadow.camera.right = 65;
sun.shadow.camera.top = 65;
sun.shadow.camera.bottom = -65;
sun.shadow.camera.far = 200;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x4a7c59, 0.35));

const ground = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), new THREE.MeshLambertMaterial({ color: 0x4a7c59 }));
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

function path(x, z, w, d) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), new THREE.MeshLambertMaterial({ color: 0xc9b99a }));
  m.rotation.x = -Math.PI / 2;
  m.position.set(x, 0.02, z);
  m.receiveShadow = true;
  scene.add(m);
}
path(0, 0, 2, 50); path(0, 0, 50, 2);
path(-10, 5, 2, 18); path(10, 5, 2, 18);
path(-10, -8, 18, 2); path(10, -8, 18, 2);

const buildings = [];
const bdata = [
  { name: 'Main Building', dept: 'Administration & Principal Office', color: 0xD4A574, x: 0, z: -14, w: 9, h: 11, d: 7 },
  { name: 'Science Block', dept: 'Physics · Chemistry · Biology Labs', color: 0x6E8FB0, x: -15, z: -8, w: 8, h: 9, d: 6 },
  { name: 'Engineering Block', dept: 'CSE · Mechanical · Electrical Depts', color: 0x7B70B8, x: 15, z: -8, w: 8, h: 9, d: 6 },
  { name: 'Central Library', dept: 'Books · Digital Resources · Reading Hall', color: 0xB87070, x: -15, z: 9, w: 7, h: 6, d: 6 },
  { name: 'Canteen', dept: 'Food Court · Student Hangout', color: 0x6CA06C, x: 15, z: 9, w: 7, h: 4, d: 6 },
  { name: 'Auditorium', dept: 'Events · Seminars · Cultural Fests', color: 0xBF9B6A, x: 0, z: 16, w: 11, h: 7, d: 9 },
  { name: 'Hostel Block A', dept: 'Boys Hostel — 200 seats', color: 0x7FA87F, x: -24, z: -2, w: 5, h: 14, d: 5 },
  { name: 'Sports Complex', dept: 'Gym · Indoor Games · Pool', color: 0xA07890, x: 24, z: 3, w: 8, h: 5, d: 7 },
];

bdata.forEach(b => {
  const geo = new THREE.BoxGeometry(b.w, b.h, b.d);
  const mat = new THREE.MeshLambertMaterial({ color: b.color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(b.x, b.h / 2, b.z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData = { name: b.name, dept: b.dept };
  scene.add(mesh);
  buildings.push(mesh);

  const roof = new THREE.Mesh(new THREE.BoxGeometry(b.w + 0.4, 0.5, b.d + 0.4), new THREE.MeshLambertMaterial({ color: 0x8B5E3C }));
  roof.position.set(b.x, b.h + 0.25, b.z);
  roof.castShadow = true;
  scene.add(roof);

  for (let fl = 0; fl < Math.floor(b.h / 3); fl++) {
    for (let col = 0; col < Math.max(1, Math.floor(b.w / 2)); col++) {
      const wm = new THREE.Mesh(new THREE.PlaneGeometry(0.65, 0.85), new THREE.MeshLambertMaterial({ color: 0xB8D9ED, emissive: 0x224466, emissiveIntensity: 0.15 }));
      const wx = b.x - b.w / 2 + 1.1 + col * 2;
      wm.position.set(wx, 1.5 + fl * 3, b.z + b.d / 2 + 0.01);
      scene.add(wm);
    }
  }
});

function tree(x, z, s) {
  s = s || 1;
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.18 * s, 0.25 * s, 2 * s, 7), new THREE.MeshLambertMaterial({ color: 0x6B3F00 }));
  trunk.position.set(x, s, z);
  trunk.castShadow = true;
  scene.add(trunk);
  const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.3 * s, 3 * s, 7), new THREE.MeshLambertMaterial({ color: 0x2D8A2D }));
  leaves.position.set(x, s * 3.5, z);
  leaves.castShadow = true;
  scene.add(leaves);
}

[[-6,6],[6,6],[-6,-4],[6,-4],[-9,3],[9,3],[-20,10],[20,10],[-20,-10],[20,-10],[3,-22],[-3,-22],[3,23],[-3,23],[-18,-16],[18,-16],[-18,16],[18,16],[-30,8],[30,8],[0,-28],[0,28],[-28,-18],[28,-18]].forEach(([x,z]) => tree(x, z));
tree(-35, -20, 1.3); tree(35, -20, 1.3); tree(-35, 20, 1.3); tree(35, 20, 1.3);

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  mouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(buildings);
  if (hits.length && hits[0].object.userData.name) {
    const d = hits[0].object.userData;
    document.getElementById('ptitle').textContent = d.name;
    document.getElementById('pdesc').textContent = d.dept;
    document.getElementById('panel').style.display = 'block';
  }
});

let dragging = false, prev = { x: 0, y: 0 };
canvas.addEventListener('mousedown', e => { dragging = true; prev = { x: e.clientX, y: e.clientY }; });
window.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  sph.theta -= (e.clientX - prev.x) * 0.005;
  sph.phi = Math.max(0.18, Math.min(1.45, sph.phi + (e.clientY - prev.y) * 0.005));
  prev = { x: e.clientX, y: e.clientY };
  applyCamera();
});
canvas.addEventListener('wheel', e => {
  sph.r = Math.max(12, Math.min(90, sph.r + e.deltaY * 0.06));
  applyCamera();
  e.preventDefault();
}, { passive: false });

let lt = null;
canvas.addEventListener('touchstart', e => { lt = e.touches[0]; }, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (!lt) return;
  const t = e.touches[0];
  sph.theta -= (t.clientX - lt.clientX) * 0.005;
  sph.phi = Math.max(0.18, Math.min(1.45, sph.phi + (t.clientY - lt.clientY) * 0.005));
  lt = t;
  applyCamera();
  e.preventDefault();
}, { passive: false });

window.addEventListener('resize', () => {
  renderer.setSize(cont.offsetWidth, cont.offsetHeight);
  camera.aspect = cont.offsetWidth / cont.offsetHeight;
  camera.updateProjectionMatrix();
});

(function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
})();
</script>
